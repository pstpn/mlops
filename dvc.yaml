stages:
  load_data:
    cmd: python -m mlops.load_data --input-path ${paths.raw_dataset} --output-dir ${paths.processed_dir} --test-size ${split.test_size} --random-state ${split.random_state}
    deps:
      - mlops/load_data.py
      - ${paths.raw_dataset}
    params:
      - split.test_size
      - split.random_state
    outs:
      - ${paths.processed_train_csv}
      - ${paths.processed_test_csv}

  preprocess:
    cmd: python -m mlops.preprocess --train-path ${paths.processed_train_csv} --test-path ${paths.processed_test_csv} --output-dir ${paths.interim_dir}
    deps:
      - mlops/preprocess.py
      - ${paths.processed_train_csv}
      - ${paths.processed_test_csv}
    outs:
      - ${paths.interim_train_features_csv}
      - ${paths.interim_train_target_csv}
      - ${paths.interim_test_features_csv}
      - ${paths.interim_test_target_csv}
      - ${paths.interim_feature_columns_json}

  train:
    cmd: python -m mlops.train --train-features-path ${paths.interim_train_features_csv} --train-target-path ${paths.interim_train_target_csv} --test-features-path ${paths.interim_test_features_csv} --test-target-path ${paths.interim_test_target_csv} --model-path ${paths.model_path} --metrics-path ${paths.metrics_path} --tracking-uri ${mlflow.tracking_uri} --experiment-name ${mlflow.experiment_name} --n-estimators ${model.n_estimators} --max-depth ${model.max_depth} --min-samples-leaf ${model.min_samples_leaf} --random-state ${model.random_state}
    deps:
      - mlops/train.py
      - ${paths.interim_train_features_csv}
      - ${paths.interim_train_target_csv}
      - ${paths.interim_test_features_csv}
      - ${paths.interim_test_target_csv}
    params:
      - model.n_estimators
      - model.max_depth
      - model.min_samples_leaf
      - model.random_state
      - mlflow.experiment_name
      - mlflow.tracking_uri
    outs:
      - ${paths.model_path}
    metrics:
      - ${paths.metrics_path}