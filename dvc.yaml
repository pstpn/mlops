stages:
  load_data:
    cmd: python -m mlops.load_data --input-path data/raw/dataset --output-dir data/processed --test-size ${split.test_size} --random-state ${split.random_state}
    deps:
      - mlops/load_data.py
      - data/raw/dataset
    params:
      - split.test_size
      - split.random_state
    outs:
      - data/processed/train.csv
      - data/processed/test.csv

  preprocess:
    cmd: python -m mlops.preprocess --train-path data/processed/train.csv --test-path data/processed/test.csv --output-dir data/interim
    deps:
      - mlops/preprocess.py
      - data/processed/train.csv
      - data/processed/test.csv
    outs:
      - data/interim/train_features.csv
      - data/interim/train_target.csv
      - data/interim/test_features.csv
      - data/interim/test_target.csv
      - data/interim/feature_columns.json

  train:
    cmd: python -m mlops.train --train-features-path data/interim/train_features.csv --train-target-path data/interim/train_target.csv --test-features-path data/interim/test_features.csv --test-target-path data/interim/test_target.csv --model-path models/fraud_model.joblib --metrics-path reports/metrics.json --tracking-uri ${mlflow.tracking_uri} --experiment-name ${mlflow.experiment_name} --n-estimators ${model.n_estimators} --max-depth ${model.max_depth} --min-samples-leaf ${model.min_samples_leaf} --random-state ${model.random_state}
    deps:
      - mlops/train.py
      - data/interim/train_features.csv
      - data/interim/train_target.csv
      - data/interim/test_features.csv
      - data/interim/test_target.csv
    params:
      - model.n_estimators
      - model.max_depth
      - model.min_samples_leaf
      - model.random_state
      - mlflow.experiment_name
      - mlflow.tracking_uri
    outs:
      - models/fraud_model.joblib
    metrics:
      - reports/metrics.json