services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.1-full
    ports:
      - "5001:5000"
    volumes:
      - ./mlflow:/mlflow
    command: ["mlflow", "server", 
              "--host", "0.0.0.0",
              "--port", "5000",
              "--backend-store-uri", "sqlite:////mlflow/mlflow.db",
              "--serve-artifacts",
              "--artifacts-destination", "/mlflow/artifacts"]
  
  app:
    image: mlops:latest
    depends_on:
      - mlflow
    environment:
      - MODEL_PATH=/app/models/fraud_model.joblib
    ports:
      - "8000:8000"
    command: ["uvicorn", "mlops.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./models:/app/models